<!-- Navbar -->
<header class="fixed top-0 left-0 w-full bg-white shadow-sm z-50">
  <div class="flex justify-between items-center px-6 md:px-16 py-6">
    <!-- Logo -->
    <div class="flex items-center">
      <img src="/images/Marvab Technologies1 1.png" alt="Techfield Logo" class="w-25 h-24 mr-0.5" />
      <span class="text-xl font-bold">Marvab Tech</span>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex space-x-8 font-medium text-gray-800">
      <a href="/index.html" class="hover:text-green-600 transition-colors">Home</a>
      <a href="/about.html" class="hover:text-green-600 transition-colors">About</a>
      <a href="/portfolio.html" class="hover:text-green-600 transition-colors">Portfolio</a>
      <a href="/contact.html" class="hover:text-green-600 transition-colors">Contact</a>
    </nav>

    <!-- Get Started Button (Desktop) -->
    <a href="#" class="hidden md:block bg-green-500 hover:bg-green-600 text-white font-semibold px-5 py-2 rounded-lg transition duration-300">
      Get Started
    </a>

    <!-- Mobile Menu Button -->
    <button id="mobile-menu-btn" class="md:hidden text-gray-800 hover:text-green-600 transition-colors">
      <i class="fas fa-bars text-xl"></i>
    </button>
  </div>
</header>

<!-- Add this style to create spacing under the fixed header -->
<div class="h-28"></div>

<!-- Mobile Sidebar Overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>

<!-- Mobile Sidebar -->
<div id="mobile-sidebar" class="fixed top-0 left-0 h-full w-80 bg-white shadow-lg z-50 transform -translate-x-full transition-transform duration-300 md:hidden">
  <div class="flex flex-col h-full">
    <!-- Sidebar Header -->
    <div class="flex justify-between items-center px-6 py-6 border-b">
      <div class="flex items-center">
        <img src="/images/Marvab Technologies1 1.png" alt="Techfield Logo" class="w-25 h-24 mr-0.5" />
        <span class="text-xl font-bold">Marvab Tech</span>
      </div>
      <button id="close-sidebar" class="text-gray-800 hover:text-green-600 transition-colors">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="flex-1 px-6 py-8">
      <ul class="space-y-6">
        <li>
          <a href="#" class="flex items-center space-x-3 text-gray-800 hover:text-green-600 transition-colors py-3 border-b border-gray-100">
            <i class="fas fa-home w-5"></i>
            <span class="font-medium">Home</span>
          </a>
        </li>
        <li>
          <a href="/about.html" class="flex items-center space-x-3 text-gray-800 hover:text-green-600 transition-colors py-3 border-b border-gray-100">
            <i class="fas fa-user w-5"></i>
            <span class="font-medium">About</span>
          </a>
        </li>
        <li>
          <a href="/portfolio.html" class="flex items-center space-x-3 text-gray-800 hover:text-green-600 transition-colors py-3 border-b border-gray-100">
            <i class="fas fa-briefcase w-5"></i>
            <span class="font-medium">Portfolio</span>
          </a>
        </li>
        <li>
          <a href="/contact.html" class="flex items-center space-x-3 text-gray-800 hover:text-green-600 transition-colors py-3 border-b border-gray-100">
            <i class="fas fa-envelope w-5"></i>
            <span class="font-medium">Contact</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Sidebar Footer -->
    <div class="px-6 py-6 border-t">
      <a href="#" class="block w-full bg-green-500 hover:bg-green-600 text-white font-semibold px-5 py-3 rounded-lg transition duration-300 text-center">
        Get Started
      </a>
    </div>
  </div>
</div>

<!-- Script for sidebar toggle -->
<script>
  const menuBtn = document.getElementById('mobile-menu-btn');
  const sidebar = document.getElementById('mobile-sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const closeBtn = document.getElementById('close-sidebar');

  menuBtn.addEventListener('click', () => {
    sidebar.classList.remove('-translate-x-full');
    overlay.classList.remove('hidden');
  });

  closeBtn.addEventListener('click', () => {
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
  });

  overlay.addEventListener('click', () => {
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
  });
</script>
